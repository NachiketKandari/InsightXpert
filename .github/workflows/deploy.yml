name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: insightx-487005
  GCP_REGION: us-central1
  CLOUD_RUN_SERVICE: insightxpert-api
  WIF_PROVIDER: projects/413119399385/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-actions@insightx-487005.iam.gserviceaccount.com

jobs:
  # ── Backend: Build & deploy to Cloud Run ──────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push Docker image
        run: |
          IMAGE="gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --cpu-boost \
            --set-env-vars "\
              LLM_PROVIDER=gemini,\
              GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},\
              GEMINI_MODEL=${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }},\
              DATABASE_URL=sqlite:///./insightxpert.db,\
              CHROMA_PERSIST_DIR=./chroma_data,\
              CORS_ORIGINS=${{ vars.CORS_ORIGINS || 'https://insightx-487005.web.app' }},\
              LOG_LEVEL=INFO,\
              SECRET_KEY=${{ secrets.SECRET_KEY }}"

  # ── Frontend: Build & deploy to Firebase Hosting ──────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build static export
        run: npm run build
        working-directory: frontend
        env:
          NEXT_OUTPUT: export

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.WIF_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ env.GCP_PROJECT_ID }}
