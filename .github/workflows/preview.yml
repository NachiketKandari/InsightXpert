name: Preview (PR)

on:
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: insightx-487005
  WIF_PROVIDER: projects/413119399385/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-actions@insightx-487005.iam.gserviceaccount.com

jobs:
  # ── Lint & test backend ───────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: insightxpert
          POSTGRES_PASSWORD: insightxpert
          POSTGRES_DB: insightxpert_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest
        env:
          LLM_PROVIDER: gemini
          GEMINI_API_KEY: fake-key-for-tests
          DATABASE_URL: postgresql://insightxpert:insightxpert@localhost:5432/insightxpert_test

  # ── Lint & build frontend ────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_OUTPUT: export

  # ── Firebase Hosting preview channel ─────────────────────────────────
  preview-hosting:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        run: npm ci && NEXT_OUTPUT=export npm run build
        working-directory: frontend

      - name: Deploy preview to Firebase Hosting
        run: |
          CHANNEL="pr-${{ github.event.pull_request.number }}"
          npx firebase-tools hosting:channel:deploy "$CHANNEL" --project ${{ env.GCP_PROJECT_ID }} --expires 7d
